<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D5FA7"/>
      <stop offset="0.55" stop-color="#0D6F63"/>
      <stop offset="1" stop-color="#0A5A52"/>
    </linearGradient>
    <linearGradient id="cap" x1="120" y1="150" x2="392" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCFCFF"/>
      <stop offset="1" stop-color="#9FC9FF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#06241F" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- icon background -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <circle cx="384" cy="120" r="190" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="110" cy="430" r="150" fill="#000000" opacity="0.08"/>

  <!-- graduation cap -->
  <g filter="url(#soft)">
    <!-- mortarboard top -->
    <path d="M256 150 L408 214 L256 278 L104 214 Z" fill="url(#cap)"/>
    <!-- cap underside / head band -->
    <path d="M168 240 L168 312 C168 350 212 372 256 372 C300 372 344 350 344 312 L344 240 L256 278 Z"
          fill="#7DD8C1"/>
    <path d="M168 240 L256 278 L344 240 L344 252 L256 290 L168 252 Z" fill="#0A4D45" opacity="0.25"/>
  </g>

  <!-- tassel -->
  <path d="M408 214 L408 300" stroke="#F4C56A" stroke-width="9" stroke-linecap="round"/>
  <circle cx="408" cy="312" r="15" fill="#F4C56A"/>
  <circle cx="408" cy="214" r="7" fill="#F4C56A"/>

  <!-- checkmark badge = "studied / done" -->
  <g>
    <circle cx="344" cy="372" r="58" fill="#F4C56A" stroke="#FCFCFF" stroke-width="8"/>
    <path d="M320 372 L338 392 L372 352" stroke="#1D5FA7" stroke-width="14"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
