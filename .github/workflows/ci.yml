name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  shared-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build & test shared (Android + common logic)
        run: ./gradlew :shared:testAndroidHostTest --stacktrace

  shared-ios:
    # The job you cannot run on Windows: proves the iOS framework links
    # and the common logic passes on the iOS simulator.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build iOS framework & run common tests on simulator
        run: ./gradlew :shared:iosSimulatorArm64Test :shared:linkDebugFrameworkIosArm64 --stacktrace
