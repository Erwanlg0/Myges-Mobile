name: PWA Pages

on:
  push:
    branches:
      - PWA
    paths:
      - web/**
      - .github/workflows/pwa-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Check GitHub Pages setup
        id: pages
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -n "$PAGES_TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          status="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pages")"

          if [[ "$status" == "200" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GitHub Pages is not enabled. Open Settings > Pages and set Source to GitHub Actions, or add a PAGES_TOKEN secret."
          fi
      - name: Configure GitHub Pages
        if: ${{ steps.pages.outputs.enabled == 'true' && env.PAGES_TOKEN == '' }}
        uses: actions/configure-pages@v6
      - name: Enable and configure GitHub Pages
        if: ${{ env.PAGES_TOKEN != '' }}
        uses: actions/configure-pages@v6
        with:
          enablement: true
          token: ${{ env.PAGES_TOKEN }}
      - uses: actions/upload-pages-artifact@v4
        if: ${{ steps.pages.outputs.enabled == 'true' }}
        with:
          path: web
      - id: deployment
        if: ${{ steps.pages.outputs.enabled == 'true' }}
        uses: actions/deploy-pages@v4
