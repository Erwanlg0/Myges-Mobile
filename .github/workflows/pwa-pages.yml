name: PWA Pages

on:
  push:
    branches:
      - PWA
    paths:
      - web/**
      - .github/workflows/pwa-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure GitHub Pages
        if: ${{ env.PAGES_TOKEN == '' }}
        uses: actions/configure-pages@v6
      - name: Enable and configure GitHub Pages
        if: ${{ env.PAGES_TOKEN != '' }}
        uses: actions/configure-pages@v6
        with:
          enablement: true
          token: ${{ env.PAGES_TOKEN }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
