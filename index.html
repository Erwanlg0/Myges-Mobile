<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c6b63">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Studly">
  <title>Studly - MyGES moderne</title>
  <link rel="manifest" href="app.webmanifest">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230c6b63'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-size='30' font-family='Arial' font-weight='700' fill='white'%3ES%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Navigation principale">
      <a class="brand" href="#dashboard" aria-label="Studly accueil">
        <span class="brand-mark">S</span>
        <span>
          <strong>Studly</strong>
          <small>MyGES modernise</small>
        </span>
      </a>
      <nav class="nav-list">
        <a class="nav-item is-active" href="#dashboard" data-route="dashboard"><span>⌂</span>Accueil</a>
        <a class="nav-item" href="#agenda" data-route="agenda"><span>◷</span>Agenda</a>
        <a class="nav-item" href="#grades" data-route="grades"><span>✓</span>Notes</a>
        <a class="nav-item" href="#absences" data-route="absences"><span>!</span>Absences</a>
        <a class="nav-item" href="#projects" data-route="projects"><span>□</span>Projets</a>
        <a class="nav-item" href="#documents" data-route="documents"><span>▤</span>Docs</a>
        <a class="nav-item" href="#events" data-route="events"><span>◇</span>Events</a>
      </nav>
      <div class="sidebar-status">
        <span class="status-dot"></span>
        <span>Synchro locale</span>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Portail étudiant</p>
          <h1 id="page-title">Accueil</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" type="button" aria-label="Rechercher">⌕</button>
          <button class="icon-button" type="button" aria-label="Notifications">◌</button>
          <button class="profile-button" type="button">
            <span>EL</span>
            <strong>Emma Laurent</strong>
          </button>
        </div>
      </header>

      <section id="view" class="view" aria-live="polite"></section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
